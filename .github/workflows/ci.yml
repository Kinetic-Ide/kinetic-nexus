name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege: these jobs only need to read the repository.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: npm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      # Hard gate: anything that ships to production must be clean.
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=low
      # Informational: dev-tooling advisories are surfaced but never block a release.
      - name: Audit all dependencies (informational)
        run: npm audit || true

  # ── Dashboard (Phase 7 redesign) ──────────────────────────────────────────────
  # The operator dashboard is a separate Vite + Preact app under web/ that builds to static
  # assets. Its own lint / typecheck / test / build gate runs on every push so a UI change can
  # never break the console or ship broken to a user.
  ui:
    name: UI (web dashboard)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Audit UI production dependencies
        run: npm audit --omit=dev --audit-level=low

      # The published demo is a build artefact committed to docs/demo, which means it can silently
      # fall behind the dashboard it is supposed to be showing — and a demo that misrepresents the
      # product is worse than no demo. Rebuilding here and diffing makes staleness a failed check
      # with an obvious fix, instead of something a visitor notices first.
      - name: Rebuild the static demo
        run: npm run build:demo
      # ADVISORY FOR NOW, deliberately. The rebuild is byte-identical when repeated on one machine,
      # but whether a Linux runner reproduces a tree built on another OS is unproven — and a gate
      # that turns red for a reason unrelated to the change in front of it blocks every pull request
      # and teaches people to ignore CI. Promote to blocking (drop continue-on-error) once this step
      # has been seen to pass on a run where docs/demo really was current.
      - name: Warn if the committed demo is out of date
        continue-on-error: true
        working-directory: .
        run: |
          if ! git diff --quiet -- docs/demo; then
            echo "::warning::docs/demo differs from a fresh build. If the dashboard changed, run 'npm run build:demo' in web/ and commit the result."
            git diff --stat -- docs/demo
            exit 1
          fi
          echo "docs/demo matches a fresh build."

  # End-to-end proof (P7.15): the compiled gateway, a real PostgreSQL, a real Redis, and a
  # real browser. Everything above tests our code with stand-ins; this job is the one that
  # would have caught the bugs humans kept finding by clicking — /v1/v1 on the Connect page,
  # the bodyless-request rejections, the double-spaced provider auth header. Latency is
  # deliberately NOT asserted anywhere in it: shared-runner timings are noise, a flaky gate
  # gets ignored, and an ignored gate is worse than none.
  e2e:
    name: End-to-end (Postgres + Redis + browser)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus
          POSTGRES_DB: nexus
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U nexus"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build
      - run: npm ci
        working-directory: web
      - run: npm run build
        working-directory: web
      - run: npm ci
        working-directory: e2e
      - run: npm run lint
        working-directory: e2e
      - run: npm run typecheck
        working-directory: e2e
      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium
        working-directory: e2e
      - name: Run the suite against the compiled gateway
        run: npx playwright test
        working-directory: e2e
        env:
          # Both packages were just built above; the harness must not rebuild them.
          E2E_SKIP_BUILD: '1'
      - name: Keep the report when something fails
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
