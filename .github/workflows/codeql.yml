name: CodeQL

# Advanced setup (replaces GitHub "default setup"). It exists so the scan can load a repo config
# that filters two rules which only ever false-positive here — see .github/codeql/codeql-config.yml.
# The default query suite is otherwise unchanged, so no new alert classes appear.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '25 6 * * 1' # weekly, so a new advisory is caught even without a push

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload results to the Security tab
      packages: read         # fetch CodeQL query packs
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          build-mode: none # JS/TS is extracted directly — no build step required
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript"
