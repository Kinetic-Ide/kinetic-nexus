name: Release

# Publishes a multi-arch container image to the GitHub Container Registry and Docker Hub on every
# version tag (e.g. v1.0.0). Can also be run manually from the Actions tab.
#
# Two registries on purpose: GHCR sits next to the source and needs no extra account, but exposes no
# public pull counter. Docker Hub is where most people look first and is the only one that reports
# pulls — which is why the README's pulls badge reads from there. One build, pushed to both, so the
# digests are identical and neither can drift from the other.
on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish, without the leading v (e.g. 1.3.0). Leave blank to publish only :latest.'
        required: false
        type: string

# Least-privilege: read the repo, write the package (image).
permissions:
  contents: read
  packages: write

env:
  IMAGE:     ghcr.io/alayra-systems-pvt-limited/alayra-nexus
  IMAGE_HUB: docker.io/alayrasystems/nexus

jobs:
  image:
    name: Build & push image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Emulation for the arm64 build (Apple Silicon / Graviton).
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # A fork without these secrets will stop here rather than half-publishing; the GHCR push above
      # needs no account beyond the repo's own token.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Every tag pattern below is expanded once per image, so both registries get the same
          # version / major.minor / latest set from a single build.
          images: |
            ${{ env.IMAGE }}
            ${{ env.IMAGE_HUB }}
          # The semver patterns read the git tag, so they only produce anything on a tag push. A
          # manual run has to be told the version instead — `workflow_dispatch` executes the
          # workflow file *at the selected ref*, so re-dispatching an older tag would run that
          # tag's workflow, not this one. Dispatch from main and pass `version` instead.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=Alayra Nexus
            org.opencontainers.image.vendor=Alayra Systems

      - name: Build & push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
