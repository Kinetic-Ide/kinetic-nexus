name: Release

# Publishes a multi-arch container image to the GitHub Container Registry on every
# version tag (e.g. v1.0.0). Can also be run manually from the Actions tab.
on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

# Least-privilege: read the repo, write the package (image).
permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/kinetic-ide/alayra-nexus

jobs:
  image:
    name: Build & push image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Emulation for the arm64 build (Apple Silicon / Graviton).
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=Alayra Nexus
            org.opencontainers.image.vendor=Alayra Systems

      - name: Build & push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
