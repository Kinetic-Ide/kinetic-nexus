services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB:       nexus
    volumes:
      # Schema is applied by the app container at startup (`prisma migrate deploy`
      # runs every migration in prisma/migrations in order) — no initdb seed needed.
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  nexus:
    # Runs the published image. `docker compose up -d` downloads it — nothing is
    # compiled, and no source checkout is needed beyond this file.
    #
    # Pin a version in production: NEXUS_VERSION=1.3.0 in your .env.
    #
    # Building from source instead (contributors):
    #   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
    image: ghcr.io/alayra-systems-pvt-limited/alayra-nexus:${NEXUS_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL:          postgresql://nexus:nexus@postgres:5432/nexus
      REDIS_URL:             redis://redis:6379
      MASTER_ENCRYPTION_KEY: ${MASTER_ENCRYPTION_KEY}
      ADMIN_PASSWORD:        ${ADMIN_PASSWORD}
      PORT:                  3000
      LOG_LEVEL:             info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
